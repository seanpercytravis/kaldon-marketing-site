name: Auto Blog Post

on:
  # Twice per week, Monday + Thursday at 16:00 UTC (09:00 PT / 12:00 ET).
  # SEO sweet spot: enough freshness to signal an active site without
  # diluting topical authority. Evergreen after the fixed topical map is
  # exhausted. The generator switches to trend-driven mode and never runs
  # out of topics.
  schedule:
    - cron: '0 16 * * 1,4'
  # Manual trigger with optional slug override for force-generation
  workflow_dispatch:
    inputs:
      slug:
        description: 'Optional: force-generate a specific slug from kaldon-blog-config.mjs'
        required: false
        type: string
      dry_run:
        description: 'Dry run (print article but do not commit)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate next blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          # `inputs` is only valid on workflow_dispatch and workflow_call.
          # On push/schedule events, any bare `${{ inputs.* }}` reference
          # fails workflow YAML validation and blocks the run from
          # spawning any job (zero-jobs failure). Use `github.event.inputs.*`
          # instead. github.event always exists, and its inputs key is
          # undefined on non-dispatch events. Defaults via `||` operator.
          INPUT_SLUG: ${{ github.event.inputs.slug || '' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS=""
          if [ -n "$INPUT_SLUG" ]; then ARGS="$ARGS --slug=$INPUT_SLUG"; fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/generate-blog-post.mjs $ARGS

      - name: Verify build still passes with new post
        if: github.event.inputs.dry_run != 'true'
        run: pnpm run build

      - name: Commit and push new post
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "kaldon-blog-bot"
          git config user.email "blog-bot@kaldon.io"
          git add src/content/blog/
          if git diff --cached --quiet; then
            echo "No new post generated (all scheduled posts already published)."
            exit 0
          fi
          # Find the most recently added .md file for a descriptive commit
          NEW_POST=$(git diff --cached --name-only | grep 'src/content/blog/.*\.md$' | head -n 1)
          POST_SLUG=$(basename "$NEW_POST" .md)
          git commit -m "blog: auto-publish $POST_SLUG

Generated by weekly blog cron.
- Post: $POST_SLUG
- Run: ${{ github.run_id }}"
          git push

      - name: Deploy to Cloudflare Workers
        if: github.event.inputs.dry_run != 'true' && success()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            pnpm exec wrangler deploy
          else
            echo "CLOUDFLARE_API_TOKEN not set — skipping deploy. Post is committed to main."
          fi
