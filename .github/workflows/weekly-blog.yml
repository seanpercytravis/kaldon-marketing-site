name: Weekly Blog Post

on:
  # Every Monday at 09:00 America/Los_Angeles == 16:00 UTC (PST) / 17:00 UTC (PDT).
  # Pick 16:00 UTC year-round; keeps the post dropping at the start of the work week.
  schedule:
    - cron: '0 16 * * 1'
  # Manual trigger with optional slug override for force-generation
  workflow_dispatch:
    inputs:
      slug:
        description: 'Optional: force-generate a specific slug from kaldon-blog-config.mjs'
        required: false
        type: string
      dry_run:
        description: 'Dry run (print article but do not commit)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate next blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.slug }}" ]; then ARGS="$ARGS --slug=${{ inputs.slug }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/generate-blog-post.mjs $ARGS

      - name: Verify build still passes with new post
        if: inputs.dry_run != 'true'
        run: pnpm run build

      - name: Commit and push new post
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "kaldon-blog-bot"
          git config user.email "blog-bot@kaldon.io"
          git add src/content/blog/
          if git diff --cached --quiet; then
            echo "No new post generated (all scheduled posts already published)."
            exit 0
          fi
          # Find the most recently added .md file for a descriptive commit
          NEW_POST=$(git diff --cached --name-only | grep 'src/content/blog/.*\.md$' | head -n 1)
          POST_SLUG=$(basename "$NEW_POST" .md)
          git commit -m "blog: auto-publish $POST_SLUG

Generated by weekly blog cron.
- Post: $POST_SLUG
- Run: ${{ github.run_id }}"
          git push

      - name: Deploy to Cloudflare Workers
        if: inputs.dry_run != 'true' && success()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            pnpm exec wrangler deploy
          else
            echo "CLOUDFLARE_API_TOKEN not set — skipping deploy. Post is committed to main."
          fi
