<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Kaldon brand mark. Signal Cyan square with white |> glyph.
       Extracted from the primary logo (public/images/logos/kaldon-logo-dark.svg)
       and centered in a 100x100 viewBox for crisp rendering at any favicon size. -->
  <rect x="3" y="3" width="94" height="94" rx="14" fill="#00D4FF"/>
  <!-- | stem: weight 10 -->
  <rect x="20" y="12" width="10" height="76" rx="1" fill="#FFFFFF"/>
  <!-- > chevron: single vertex at the stem, arms extending right -->
  <polygon points="33,50 80,12 80,26 43,50 80,74 80,88" fill="#FFFFFF"/>
</svg>
